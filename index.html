<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="カインを操作し、オーエンと旅をする全三章のブラウザRPG。">
    <title>騎士カインと封印の旅｜公式トップページ</title>
    <link rel="stylesheet" href="top.css">
</head>

<body>
    <main class="title-screen">
        <section class="hero" aria-labelledby="game-title">
            <!-- 画像ロゴを用意したら、この見出しを同じ枠内の img 要素へ差し替えられます。 -->
            <div class="title-lockup">
                <p class="title-kicker">Browser RPG</p>
                <h1 id="game-title">騎士カインと封印の旅</h1>
            </div>

            <p class="introduction">
                カインを操作し、<br>
                オーエンと旅をする<br>
                全三章のブラウザRPG。
            </p>

            <a class="start-button" href="chapter1.html">
                <span class="chapter-name">第一章「宿屋と銀貨」</span>
                <span class="start-label">ゲームを始める</span>
            </a>

            <nav class="chapter-list" aria-label="章の一覧">
                <!-- 制作後は href を追加するだけでリンクとして有効化できます。 -->
                <a class="chapter-item is-disabled" aria-disabled="true" tabindex="-1">第二章　制作中</a>
                <a class="chapter-item is-disabled" aria-disabled="true" tabindex="-1">第三章　制作中</a>
            </nav>
        </section>

        <section class="characters" aria-label="キャラクター紹介">
            <!-- 各カードの --character-image: none を url(...) に変えると背景画像を設定できます。 -->
            <article class="character-card character-card--cain">
                <div class="character-copy">
                    <h2>カイン</h2>
                    <p>元・中央の国の騎士団長。<br>宝剣を携え、国を離れて旅をしている。</p>
                </div>
            </article>

            <article class="character-card character-card--owen">
                <div class="character-copy">
                    <h2>オーエン</h2>
                    <p>北の国の魔法使い。<br>なぜかカインの旅に同行している。</p>
                </div>
            </article>
        </section>

        <footer class="utility-links" aria-label="案内リンク">
            <!-- URL決定後は href を追加してください。 -->
            <a aria-disabled="true">攻略で困ったとき</a>
            <span aria-hidden="true">／</span>
            <a aria-disabled="true">感想を送る</a>
        </footer>
    </main>
</body>

</html>
